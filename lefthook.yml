# Formatter-only hooks.
# pre-commit auto-formats & re-stages so formatting lands in the commit.
# pre-push verifies the tree is formatted and blocks pushes that aren't.
# (Linting is intentionally not run in hooks; use `pnpm lint` / the editor for that.)
pre-commit:
  commands:
    format:
      glob: "*.{js,jsx,ts,tsx,json,jsonc,css,md}"
      run: pnpm oxfmt {staged_files}
      stage_fixed: true

pre-push:
  commands:
    format:
      run: pnpm oxfmt --check
